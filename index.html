<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicion de Seción (Login)</title>
    <link rel="stylesheet" href="style.css">Inicion de Seción (Login)</link>
</head>
<body>
    <div class="container">
        <h1 id="titu">Inicion de Sesión</h1>        
        <div class="demo-section">
            <h2 class="demo-title" id="demo">Bienvenido</h2>
            <p id="tex">Haz clic en los botones para ingresar sus datos.</p>
            
            <div class="btn-group">
                <button id="simplePromptBtn" class="btn btn-primary">
                    Ingrese su Nombre de Usuario
                </button>
                <button id="validationPromptBtn" class="btn btn-primary">
                    Ingrese su Correo
                </button>
                <button id="passwordPromptBtn" class="btn btn-primary">
                    Ingrese su Contraseña
                </button>
            </div>
        </div>
        
        <div id="result" class="result">
            <h3 id="d">Datos:</h3>
            <p id="resultText1"></p>
            <p id="resultText2"></p>
            <p id="resultText3"></p>
        </div>

        <div class="dt">
        <button id="t" class="t">Traductor</button>
        </div>
    </div>
    
    <!-- Modal personalizado para el prompt -->
    <div id="customPrompt" class="custom-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="promptTitle">Prompt Personalizado</div>
                <button class="close-btn" id="closePromptBtn">&times;</button>
            </div>
            <div class="modal-body">
                <p class="modal-message" id="promptMessage">Por favor, ingresa un valor:</p>
                <input type="text" class="modal-input" id="promptInput" placeholder="Escribe aquí...">
                <p id="validationMessage" style="color: #e74c3c; font-size: 0.9rem; margin-top: -15px; margin-bottom: 20px; display: none;"></p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" id="cancelPromptBtn">Cancelar</button>
                <button class="modal-btn confirm" id="confirmPromptBtn" disabled>Aceptar</button>
            </div>
        </div>
    </div>
    
    <footer>
        <p>JD Productions</p>
    </footer>

    <script src="script.js">
    </script>
</body>
</html>
